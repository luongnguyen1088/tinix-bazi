version: '3.8'
services:
  backend:
    build:
      context: ./backendjs
      dockerfile: Dockerfile
    environment:
      - PORT=8888
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=deepseek/deepseek-chat
    volumes:
      - bazi-data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

volumes:
  bazi-data:

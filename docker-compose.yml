version: '3.8'
services:
  backend:
    build:
      context: ./backendjs
      dockerfile: Dockerfile
    environment:
      - PORT=8888
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=deepseek/deepseek-chat
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    volumes:
      - bazi-data:/app/data
    networks:
      - bazi-stack-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - bazi-stack-network

networks:
  bazi-stack-network:
    driver: bridge

volumes:
  bazi-data:
